<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сириус.Аренда - Сервис бронирования пространств</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .card-header {
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .header-title {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .room-card {
            transition: transform 0.2s;
        }
        .room-card:hover {
            transform: translateY(-5px);
        }
        .badge-capacity {
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-title">
            <h1>🏢 Сириус.Аренда 🏢</h1>
            <p class="lead">Сервис бронирования пространств</p>
        </div>

        <div class="row">
            <!-- Доступные пространства -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">📋 Доступные пространства</h5>
                        <button class="btn btn-sm btn-light" onclick="loadRooms()"> Обновить</button>
                    </div>
                    <div class="card-body">
                        <div id="rooms-list">
                            <p class="text-muted text-center">Загрузка...</p>
                        </div>
                    </div>
                </div>

                <!-- Поиск свободных пространств -->
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"> Поиск свободных пространств</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="search-date" class="form-label">Дата:</label>
                                <input type="date" id="search-date" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="search-capacity" class="form-label">Мин. вместимость:</label>
                                <input type="number" id="search-capacity" class="form-control" placeholder="Необязательно" min="1">
                            </div>
                        </div>
                        <button class="btn btn-info w-100 mb-3" onclick="searchAvailableRooms()">
                            Найти свободные
                        </button>

                        <div id="available-rooms-result" style="display: none;">
                            <h6>Свободные комнаты:</h6>
                            <div id="available-rooms-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Добавление пространства -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">➕ Добавить пространство</h5>
                    </div>
                    <div class="card-body">
                        <form id="add-room-form" onsubmit="addRoom(event)">
                            <div class="mb-3">
                                <label for="room-name" class="form-label">Название</label>
                                <input type="text" class="form-control" id="room-name" required placeholder="Например: Переговорная А">
                            </div>
                            <div class="mb-3">
                                <label for="room-capacity" class="form-label">Вместимость (чел.)</label>
                                <input type="number" class="form-control" id="room-capacity" required min="1" placeholder="10">
                            </div>
                            <div class="mb-3">
                                <label for="room-equipment" class="form-label">Оборудование</label>
                                <input type="text" class="form-control" id="room-equipment" placeholder="Проектор, доска, маркеры">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Создать</button>
                        </form>
                    </div>
                </div>

                <!-- Бронирование -->
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">📅 Забронировать</h5>
                    </div>
                    <div class="card-body">
                        <form id="booking-form" onsubmit="createBooking(event)">
                            <div class="mb-3">
                                <label for="booking-room" class="form-label">Выберите комнату</label>
                                <select class="form-select" id="booking-room" required>
                                    <option value="">Загрузка...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="booking-start" class="form-label">Начало</label>
                                <input type="datetime-local" class="form-control" id="booking-start" required>
                            </div>
                            <div class="mb-3">
                                <label for="booking-end" class="form-label">Окончание</label>
                                <input type="datetime-local" class="form-control" id="booking-end" required>
                            </div>
                            <div class="mb-3">
                                <label for="booking-user" class="form-label">Ваше имя</label>
                                <input type="text" class="form-control" id="booking-user" required placeholder="Иван Иванов">
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Забронировать</button>
                        </form>
                    </div>
                </div>

                <!-- Активные бронирования -->
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">️ Активные бронирования</h5>
                    </div>
                    <div class="card-body">
                        <div id="bookings-list">
                            <p class="text-muted text-center">Загрузка...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://127.0.0.1:8000';

        //загрузка комнат при старте
        document.addEventListener('DOMContentLoaded', function() {
            loadRooms();
            loadBookings();

            // Устанавливаем сегодняшнюю дату для поиска
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('search-date').value = today;
        });

        //загрузка списка комнат
        async function loadRooms() {
            try {
                const response = await fetch(`${API_URL}/rooms`);
                const rooms = await response.json();

                const roomsList = document.getElementById('rooms-list');
                const bookingSelect = document.getElementById('booking-room');

                if (rooms.length === 0) {
                    roomsList.innerHTML = '<p class="text-muted text-center">Нет доступных пространств. Создайте первое!</p>';
                    bookingSelect.innerHTML = '<option value="">Нет доступных комнат</option>';
                    return;
                }

                //отображение комнат
                roomsList.innerHTML = rooms.map(room => `
                    <div class="card mb-2 room-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="card-title mb-1">${room.name}</h6>
                                    <span class="badge bg-primary badge-capacity">👥 ${room.capacity} чел.</span>
                                    ${room.equipment ? `<p class="card-text small text-muted mb-0 mt-1">🔧 ${room.equipment}</p>` : ''}
                                </div>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRoom(${room.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                //обновление select для бронирования
                bookingSelect.innerHTML = rooms.map(room =>
                    `<option value="${room.id}">${room.name} (вместимость: ${room.capacity})</option>`
                ).join('');

            } catch (error) {
                console.error('Ошибка при загрузке комнат:', error);
                document.getElementById('rooms-list').innerHTML =
                    '<p class="text-danger text-center">Ошибка загрузки</p>';
            }
        }

        //добавление комнаты
        async function addRoom(event) {
            event.preventDefault();

            const roomData = {
                name: document.getElementById('room-name').value,
                capacity: parseInt(document.getElementById('room-capacity').value),
                equipment: document.getElementById('room-equipment').value || null
            };

            try {
                const response = await fetch(`${API_URL}/rooms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(roomData)
                });

                if (response.ok) {
                    document.getElementById('add-room-form').reset();
                    loadRooms();
                    alert('Пространство успешно создано!');
                } else {
                    const error = await response.json();
                    alert(`Ошибка: ${error.detail}`);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при создании пространства');
            }
        }

        //удаление комнаты
        async function deleteRoom(roomId) {
            if (!confirm('Вы уверены, что хотите удалить это пространство?')) return;

            try {
                const response = await fetch(`${API_URL}/rooms/${roomId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadRooms();
                    loadBookings();
                } else {
                    const error = await response.json();
                    alert(`Ошибка: ${error.detail}`);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при удалении');
            }
        }

        //создание бронирования
        async function createBooking(event) {
            event.preventDefault();

            const bookingData = {
                room_id: parseInt(document.getElementById('booking-room').value),
                start_time: document.getElementById('booking-start').value,
                end_time: document.getElementById('booking-end').value,
                user_name: document.getElementById('booking-user').value
            };

            try {
                const response = await fetch(`${API_URL}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });

                if (response.ok) {
                    document.getElementById('booking-form').reset();
                    loadBookings();
                    alert('Бронирование успешно создано!');
                } else {
                    const error = await response.json();
                    alert(`Ошибка: ${error.detail}`);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при создании бронирования');
            }
        }

        //загрузка бронирований
        async function loadBookings() {
            try {
                const response = await fetch(`${API_URL}/bookings`);
                const bookings = await response.json();

                const bookingsList = document.getElementById('bookings-list');

                if (bookings.length === 0) {
                    bookingsList.innerHTML = '<p class="text-muted text-center">Нет активных бронирований</p>';
                    return;
                }

                //загрузка информации о комнатах
                const roomsResponse = await fetch(`${API_URL}/rooms`);
                const rooms = await roomsResponse.json();
                const roomMap = {};
                rooms.forEach(room => {
                    roomMap[room.id] = room.name;
                });

                bookingsList.innerHTML = bookings.map(booking => `
                    <div class="card mb-2">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="card-title mb-1">${roomMap[booking.room_id] || 'Комната #' + booking.room_id}</h6>
                                    <p class="card-text small mb-1">
                                        📅 ${new Date(booking.start_time).toLocaleString('ru-RU')} - ${new Date(booking.end_time).toLocaleString('ru-RU')}
                                    </p>
                                    <p class="card-text small text-muted mb-0">👤 ${booking.user_name}</p>
                                </div>
                                <button class="btn btn-sm btn-outline-danger" onclick="cancelBooking(${booking.id})">❌ Отменить</button>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Ошибка при загрузке бронирований:', error);
                document.getElementById('bookings-list').innerHTML =
                    '<p class="text-danger text-center">Ошибка загрузки</p>';
            }
        }

        //отмена бронирования
        async function cancelBooking(bookingId) {
            if (!confirm('Отменить бронирование?')) return;

            try {
                const response = await fetch(`${API_URL}/bookings/${bookingId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadBookings();
                } else {
                    const error = await response.json();
                    alert(`Ошибка: ${error.detail}`);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при отмене бронирования');
            }
        }

        //поиск свободных комнат
        async function searchAvailableRooms() {
            const dateInput = document.getElementById('search-date').value;
            const capacity = document.getElementById('search-capacity').value;

            if (!dateInput) {
                alert('Пожалуйста, выберите дату');
                return;
            }

            const startDateTime = `${dateInput}T00:00:00`;
            const endDateTime = `${dateInput}T23:59:59`;

            try {
                let url = `${API_URL}/rooms/available?start=${encodeURIComponent(startDateTime)}&end=${encodeURIComponent(endDateTime)}`;

                if (capacity) {
                    url += `&capacity=${encodeURIComponent(capacity)}`;
                }

                const response = await fetch(url);

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('Server error:', errorData);


                    let errorMessage = 'Ошибка при поиске';
                    if (errorData.detail) {
                        if (Array.isArray(errorData.detail)) {
                            errorMessage = errorData.detail.map(e => e.msg || String(e)).join(', ');
                        } else {
                            errorMessage = String(errorData.detail);
                        }
                    }

                    throw new Error(errorMessage);
                }

                const rooms = await response.json();

                const resultDiv = document.getElementById('available-rooms-result');
                const listDiv = document.getElementById('available-rooms-list');

                if (rooms.length === 0) {
                    listDiv.innerHTML = '<div class="alert alert-warning">Нет свободных комнат на выбранную дату</div>';
                } else {
                    listDiv.innerHTML = rooms.map(room => `
                        <div class="card mb-2 border-success">
                            <div class="card-body">
                                <h6 class="card-title text-success">✅ ${room.name}</h6>
                                <p class="card-text mb-1">
                                    <strong>Вместимость:</strong> ${room.capacity} чел.
                                </p>
                                ${room.equipment ? `<p class="card-text mb-0"><small class="text-muted">🔧 ${room.equipment}</small></p>` : ''}
                            </div>
                        </div>
                    `).join('');
                }

                resultDiv.style.display = 'block';

            } catch (error) {
                console.error('Ошибка:', error);
                alert(`Ошибка при поиске: ${error.message || 'Неизвестная ошибка'}`);
            }
        }
    </script>
</body>
</html>
